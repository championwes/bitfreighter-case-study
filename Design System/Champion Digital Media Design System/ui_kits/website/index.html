<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Champion Digital Media — Studio</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    body { margin: 0; }
    /* Focus + form-field underline detail */
    input:focus, textarea:focus { border-bottom-color: var(--color-yellow) !important; }
    /* Hover scale on yellow buttons */
    button:hover { transform: scale(1.02); }
    a:hover { opacity: .65; }
    /* Page is authored at 1440 — let it scroll naturally; preview iframe will scale. */
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [contactOpen, setContactOpen] = useState(false);
      return (
        <>
          <Nav onContact={() => setContactOpen(true)} />
          <Hero />
          <Manifesto />
          <WorkGrid />
          <DarkCTA onContact={() => setContactOpen(true)} />
          <Footer />
          <ContactModal open={contactOpen} onClose={() => setContactOpen(false)} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
