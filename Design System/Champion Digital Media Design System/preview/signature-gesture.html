<!doctype html><html><head><meta charset="utf-8"><title>Signature Gesture</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:30px 24px; background:var(--bg-1); }
  .head { font-family:var(--font-display); font-style:italic; font-size:62px; line-height:1.0; text-transform:uppercase; color:var(--fg-1); letter-spacing:0; }
  .circled { font-weight:700; position:relative; display:inline-block; padding:0 .12em; }
  .circled::after { content:""; position:absolute; inset:-.18em -.05em -.12em -.05em; background-image:url("../assets/brushes/oval-speed.svg?v=2"); background-repeat:no-repeat; background-size:100% 100%; z-index:-1; }
  .meta { font-family:var(--font-body); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-top:18px; }
</style></head>
<body>
  <div class="head">FOR BRANDS THAT <span class="circled">MOVE</span></div>
  <div class="meta">PODIUM SHARP ITALIC · BOLDED + CIRCLED EMPHASIS · ONE PER HEADLINE</div>
</body></html>
