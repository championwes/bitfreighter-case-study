<!doctype html><html><head><meta charset="utf-8"><title>Tracking & Case</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-1); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns: 110px 1fr; gap:14px; align-items:baseline; padding:8px 0; border-top:var(--border-hairline); }
  .row:first-child { border-top:0; }
  .meta { font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); }
  .specimen { font-size:14px; }
  .caps { text-transform:uppercase; }
</style></head>
<body>
  <div class="row"><div class="meta">Display · 0</div><div class="specimen caps" style="font-family:var(--font-display); font-style:italic; font-size:22px; letter-spacing:0;">FOR BRANDS THAT MOVE</div></div>
  <div class="row"><div class="meta">Caps label · .08em</div><div class="specimen caps" style="font-weight:600; font-size:12px; letter-spacing:.08em;">CASE STUDY 03 / 12</div></div>
  <div class="row"><div class="meta">Body · 0</div><div class="specimen" style="font-size:13px; letter-spacing:0;">We use every tool we have. The decisions stay ours.</div></div>
  <div class="row"><div class="meta">Micro · .04em</div><div class="specimen caps" style="font-size:10px; letter-spacing:.04em;">Footnote · metadata · legal</div></div>
</body></html>
