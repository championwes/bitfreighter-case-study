<!doctype html><html><head><meta charset="utf-8"><title>Brush Library</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:var(--bg-1); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .cell { aspect-ratio:1/1; border:var(--border-hairline); display:flex; align-items:center; justify-content:center; padding:8px; }
  .cell img { max-width:100%; max-height:100%; }
  .meta { font-family:var(--font-body); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-top:10px; }
</style></head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/brushes/oval-speed.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/oval-move.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/brush-01.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/brush-03.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/brush-05.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/brush-07.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/brush-02.svg" alt=""></div>
    <div class="cell"><img src="../assets/brushes/brush-06.svg" alt=""></div>
  </div>
  <div class="meta">Use sparingly · Never as a protagonist · Yellow by default</div>
</body></html>
