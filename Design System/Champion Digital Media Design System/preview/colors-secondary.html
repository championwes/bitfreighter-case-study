<!doctype html><html><head><meta charset="utf-8"><title>Secondary Blues</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-1); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .sw { aspect-ratio: 1 / 1; padding:10px; display:flex; flex-direction:column; justify-content:flex-end; color:#F7F3E9; }
  .sw .name { font-family:var(--font-body); font-size:9px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; }
  .sw .hex { font-family:var(--font-body); font-size:9px; opacity:.75; margin-top:2px; }
  .b1 { background:#062D51; }
  .b2 { background:#005686; }
  .b3 { background:#1F81A5; }
  .b4 { background:#0BAED3; color:#141414; }
  .note { font-family:var(--font-body); font-size:10px; color:var(--fg-3); margin-top:12px; letter-spacing:.04em; }
</style></head>
<body>
  <div class="row">
    <div class="sw b1"><div class="name">Blue Darkest</div><div class="hex">#062D51</div></div>
    <div class="sw b2"><div class="name">Blue Dark</div><div class="hex">#005686</div></div>
    <div class="sw b3"><div class="name">Blue Mid</div><div class="hex">#1F81A5</div></div>
    <div class="sw b4"><div class="name">Blue Bright</div><div class="hex">#0BAED3</div></div>
  </div>
  <p class="note">Use as a family. Cool territory: data viz, photo overlays, atmospheric sections.</p>
</body></html>
