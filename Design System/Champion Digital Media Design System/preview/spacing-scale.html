<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-1); font-family:var(--font-body); }
  .row { display:flex; align-items:center; gap:12px; padding:5px 0; border-top:var(--border-hairline); }
  .row:first-child { border-top:0; }
  .name { width:70px; font-size:10px; letter-spacing:.06em; text-transform:uppercase; font-weight:600; color:var(--fg-1); }
  .px { width:40px; font-size:10px; color:var(--fg-3); text-align:right; }
  .bar { background:var(--color-yellow); height:14px; }
</style></head>
<body>
  <div class="row"><div class="name">space-1</div><div class="px">8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="name">space-2</div><div class="px">16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="name">space-3</div><div class="px">24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="name">space-4</div><div class="px">32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="name">space-5</div><div class="px">48</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="name">space-6</div><div class="px">64</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="name">space-7</div><div class="px">96</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="name">space-8</div><div class="px">128</div><div class="bar" style="width:128px"></div></div>
  <div class="row"><div class="name">space-9</div><div class="px">192</div><div class="bar" style="width:192px"></div></div>
</body></html>
