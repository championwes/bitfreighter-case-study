<!doctype html><html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-1); }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; align-items:baseline; gap:18px; border-top:var(--border-hairline); padding-top:10px; }
  .row:first-child { border-top:0; padding-top:0; }
  .meta { font-family:var(--font-body); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); width:90px; flex:0 0 auto; }
  .spec { font-family:var(--font-display); font-style:italic; color:var(--fg-1); line-height:1.0; text-transform:uppercase; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">Display LG · 96</div><div class="spec" style="font-size:54px;">STILL AT SPEED</div></div>
    <div class="row"><div class="meta">Display MD · 72</div><div class="spec" style="font-size:42px;">FOR BRANDS</div></div>
    <div class="row"><div class="meta">Display SM · 56</div><div class="spec" style="font-size:32px;">SECTION OPENER</div></div>
    <div class="row"><div class="meta">Heading LG · 40</div><div class="spec" style="font-size:24px; font-style:normal; font-family:var(--font-body); font-weight:600; letter-spacing:.04em;">PAGE HEADING</div></div>
  </div>
</body></html>
