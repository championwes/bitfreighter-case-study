<!doctype html><html><head><meta charset="utf-8"><title>Voice Examples</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-1); font-family:var(--font-body); }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th, td { text-align:left; padding:10px 12px; border-top:var(--border-hairline); vertical-align:top; line-height:1.5; }
  th { font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); font-weight:600; border:0; padding-bottom:4px; }
  .no { color:var(--fg-3); text-decoration:line-through; }
  .yes { color:var(--fg-1); font-weight:500; }
</style></head>
<body>
  <table>
    <tr><th>Not this</th><th>This</th></tr>
    <tr><td class="no">We leverage cutting-edge AI to deliver results.</td><td class="yes">We use every tool we have. The decisions stay ours.</td></tr>
    <tr><td class="no">Amazing creative work for ambitious brands!</td><td class="yes">FOR BRANDS THAT MOVE.</td></tr>
    <tr><td class="no">Let's jump on a call!</td><td class="yes">let's talk</td></tr>
  </table>
</body></html>
