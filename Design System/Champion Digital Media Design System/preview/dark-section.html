<!doctype html><html><head><meta charset="utf-8"><title>Dark Section</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--color-dark); padding:32px 28px; }
  .eyebrow { font-family:var(--font-body); font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:rgba(247,243,233,.6); }
  .quote { font-family:var(--font-display); font-style:italic; font-size:42px; line-height:1.05; text-transform:uppercase; color:var(--color-pale); margin:14px 0 0; }
  .em { font-weight:700; position:relative; display:inline-block; padding:0 .1em; }
  .em::after { content:""; position:absolute; inset:-.18em -.05em -.12em -.05em; background-image:url("../assets/brushes/oval-move.svg?v=2"); background-repeat:no-repeat; background-size:100% 100%; z-index:0; }
  .em > span { position:relative; z-index:1; }
  .meta { font-family:var(--font-body); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:rgba(247,243,233,.5); margin-top:18px; }
</style></head>
<body>
  <div class="eyebrow">MANIFESTO · 02</div>
  <div class="quote">STILL AT <span class="em"><span>SPEED.</span></span></div>
  <div class="meta">DARK SECTION · BREATH BETWEEN MAJOR SCROLLS</div>
</body></html>
