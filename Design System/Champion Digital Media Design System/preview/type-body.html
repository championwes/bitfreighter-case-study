<!doctype html><html><head><meta charset="utf-8"><title>Body Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--bg-1); }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .row { display:grid; grid-template-columns: 100px 1fr; gap:18px; align-items:baseline; border-top:var(--border-hairline); padding-top:10px; }
  .row:first-child { border-top:0; padding-top:0; }
  .meta { font-family:var(--font-body); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">Lead · 20</div><p style="font-size:18px; line-height:1.5; max-width:none; margin:0;">We work at the pace of the medium without moving at its pace.</p></div>
    <div class="row"><div class="meta">Body · 16</div><p style="font-size:14px; line-height:1.6; max-width:none; margin:0;">Champion Digital is a creative marketing studio. The work is digital, but the sensibility is handmade.</p></div>
    <div class="row"><div class="meta">Small · 14</div><p style="font-size:12px; line-height:1.55; max-width:none; margin:0; color:var(--fg-3);">Secondary body. Captions, footnotes, supporting copy.</p></div>
    <div class="row"><div class="meta">Micro · 12</div><div style="font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:600;">CASE STUDY 03 / 12</div></div>
  </div>
</body></html>
